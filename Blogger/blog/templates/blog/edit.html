{% extends 'main/base.html' %}

{% block content %}
<section class="create-section">
    <div class="create-card">
        <h1 class="create-title">Edit Post</h1>
        <form method="POST" class="create-form" action="{% url 'blog:post_edit' post.pk %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ post.title }}" required>
            </div>
            <div class="form-group">
                <label for="content">Description</label>
                <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea>
            </div>
            <div class="form-group">
                <label for="poster">Poster Image</label>
                {% if post.poster %}
                    <img src="{{ post.poster.url }}" alt="Current Image" class="edit-current-image">
                {% endif %}
                <input type="file" id="poster" name="poster" accept="image/*">
            </div>
            <div class="form-actions">
                <a href="{% url 'main:home' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
